<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite 50 Anos - Tony</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b1a30; /* Fundo azul escuro combinando com o convite */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        /* Contêiner principal do convite atualizado para 1158 x 1378 */
.convite-container {
    position: relative;
    width: 100%;
    max-width: 450px; /* Mantém uma largura excelente para celulares */
    aspect-ratio: 1158 / 1378; /* Proporção exata da sua imagem */
    background-image: url('img.png'); /* Nome do seu arquivo */
    background-size: contain; /* Garante que a imagem apareça 100% sem cortes */
    background-repeat: no-repeat;
    background-position: center;
    box-shadow: 0px 4px 20px rgba(0,0,0,0.5);
}
        }

       /* Área onde os botões vão ficar posicionados (Corrigido para horizontal na parte inferior) */
.botoes-container {
    position: absolute;
    bottom: 6%; /* Distância da borda inferior. Ajuste se precisar subir ou descer tudo */
    left: 50%;
    transform: translateX(-50%);
    width: 90%; /* Ocupa quase toda a largura do convite para espalhar os botões */
    display: flex;
    flex-direction: row; /* Força os botões a ficarem um ao lado do outro */
    justify-content: space-around; /* Distribui o espaço igualmente entre os 3 botões */
    align-items: center;
    z-index: 10; /* Garante que fiquem por cima de qualquer elemento */
}

/* Estilização dos botões interativos */
.btn-interativo {
    display: flex;
    flex-direction: column; /* Ícone em cima, texto embaixo */
    align-items: center;
    text-decoration: none;
    color: #e5c158; /* Dourado */
    font-size: 10px; /* Tamanho do texto ajustado para caber em telas menores */
    font-weight: bold;
    text-transform: uppercase;
    transition: transform 0.2s ease;
    text-align: center;
    width: 30%; /* Cada botão consome cerca de 1/3 do espaço horizontal */
}

.btn-interativo:hover {
    transform: scale(1.1);
}

/* Ícone redondo */
.btn-interativo .icone {
    width: 45px;
    height: 45px;
    border: 2px solid #e5c158;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    margin-bottom: 6px;
    background-color: rgba(11, 26, 48, 0.9); /* Fundo escuro para dar contraste sobre o balão */
}
    </style>
</head>
<body>

    <div class="convite-container">
        
        <div class="botoes-container">
            
            <a href="https://wa.me/8288723550" target="_blank" class="btn-interativo">
                <div class="icone"><i class="fa-solid fa-user-check"></i></div>
                <span>Confirmar Presença</span>
            </a>

            <a href="https://maps.google.com" target="_blank" class="btn-interativo">
                <div class="icone"><i class="fa-solid fa-location-dot"></i></div>
                <span>Como Chegar</span>
            </a>

            <a href="sua-lista-ou-pix.html" class="btn-interativo">
                <div class="icone"><i class="fa-solid fa-gift"></i></div>
                <span>Sugestão de Presente</span>
            </a>

        </div>

    </div>

</body>
</html>
