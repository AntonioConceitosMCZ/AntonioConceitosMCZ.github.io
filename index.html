<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite 50 Anos - Tony</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset básico de margens */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b1a30; /* Azul escuro idêntico ao fundo do convite */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 10px;
        }

        /* Contêiner principal do convite baseado no tamanho 1158 x 1378 */
        .convite-container {
            position: relative;
            width: 100%;
            max-width: 450px; /* Largura ideal e responsiva para smartphones */
            aspect-ratio: 1158 / 1378; /* Mantém a proporção exata da sua imagem */
            background-image: url('img.png'); /* ⚠️ SUBSTITUA PELO NOME DO SEU ARQUIVO DE IMAGEM */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0px 4px 25px rgba(0, 0, 0, 0.6);
        }

        /* Área dos botões: Alinhados estritamente na horizontal e centralizados na parte inferior */
        .botoes-container {
            position: absolute;
            bottom: 5%; /* Posiciona perfeitamente na zona inferior da imagem */
            left: 50%;
            transform: translateX(-50%);
            width: 92%; /* Ocupa a largura interna do convite */
            display: flex;
            flex-direction: row; /* Força os botões a ficarem lado a lado */
            justify-content: space-around; /* Distribui os botões uniformemente */
            align-items: center;
            z-index: 10;
        }

        /* Estilização individual de cada botão interativo */
        .btn-interativo {
            display: flex;
            flex-direction: column; /* Ícone no topo, texto abaixo */
            align-items: center;
            text-decoration: none;
            color: #e5c158; /* Tom dourado do convite */
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            width: 30%; /* Divisão exata de espaço para os 3 itens */
            transition: transform 0.2s ease;
        }

        /* Efeito sutil ao passar o mouse ou tocar */
        .btn-interativo:hover {
            transform: scale(1.08);
        }

        /* Círculo do ícone */
        .btn-interativo .icone {
            width: 46px;
            height: 46px;
            border: 2px solid #e5c158;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            margin-bottom: 6px;
            background-color: rgba(11, 26, 48, 0.95); /* Fundo sólido para isolar o ícone dos balões atrás */
            box-shadow: 0px 3px 10px rgba(0, 0, 0, 0.4);
        }

        /* Ajuste fino para textos longos não quebrarem feio */
        .btn-interativo span {
            display: block;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="convite-container">

        <div class="botoes-container">

            <a href="https://wa.me/5582999999999?text=Olá!%20Gostaria%20de%20confirmar%20minha%20presença%20no%20aniversário%20de%2050%20anos%20do%20Tony." target="_blank" class="btn-interativo">
                <div class="icone"><i class="fa-solid fa-user-check"></i></div>
                <span>Confirmar Presença</span>
            </a>

            <a href="https://maps.app.goo.gl/b1tr5zsRVi6dmU5X6" target="_blank" class="btn-interativo">
                <div class="icone"><i class="fa-solid fa-location-dot"></i></div>
                <span>Como Chegar</span>
            </a>

            <a href="#" class="btn-interativo">
                <div class="icone"><i class="fa-solid fa-gift"></i></div>
                <span>Sugestão Presente</span>
            </a>

        </div>

    </div>

</body>
</html>
