<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite 50 Anos - Tony</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b1a30; /* Fundo azul escuro */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        /* Contêiner que envelopa a imagem + botões */
        .wrapper-convite {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contêiner principal da imagem */
        .convite-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1158 / 1378; /* Proporção exata da sua imagem */
            background-image: url('img.png'); /* Nome do seu arquivo */
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.5);
            border-radius: 8px;
        }

        /* Área dos botões - Agora abaixo do convite e perfeitamente horizontal */
        .botoes-container {
            width: 100%; 
            display: flex;
            flex-direction: row; /* Força os botões ficarem lado a lado */
            justify-content: space-between; /* Distribui os botões igualmente */
            align-items: flex-start;
            margin-top: 20px; /* Distância segura abaixo da imagem */
            z-index: 10;
        }

        /* Estilização dos botões interativos */
        .btn-interativo {
            display: flex;
            flex-direction: column; /* Ícone em cima, texto embaixo */
            align-items: center;
            text-decoration: none;
            color: #e5c158; /* Dourado */
            font-size: 11px; 
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s ease;
            text-align: center;
            width: 31%; /* Divide o espaço igualmente entre os 3 */
        }

        .btn-interativo:hover {
            transform: scale(1.05);
        }

        /* Ícone redondo */
        .btn-interativo .icone {
            width: 50px;
            height: 50px;
            border: 2px solid #e5c158;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            margin-bottom: 8px;
            background-color: rgba(11, 26, 48, 0.9);
            color: #e5c158;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="wrapper-convite">
        
        <div class="convite-container"></div>
        
        <div class="botoes-container">
            
            <a href="https://wa.me/5582988723550" target="_blank" class="btn-interativo">
                <div class="icone"><i class="fa-solid fa-user-check"></i></div>
                <span>Confirmar Presença</span>
            </a>

            <a href="https://maps.google.com" target="_blank" class="btn-interativo">
                <div class="icone"><i class="fa-solid fa-location-dot"></i></div>
                <span>Como Chegar</span>
            </a>

            <a href="sua-lista-ou-pix.html" class="btn-interativo">
                <div class="icone"><i class="fa-solid fa-gift"></i></div>
                <span>Sugestão de Presente</span>
            </a>

        </div>

    </div>

</body>
</html>
