<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugestões de Presentes - Tony 50 Anos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Mantendo a base visual do convite principal */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b1a30; /* Mesmo azul escuro */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        /* Cartão de conteúdo */
        .card-presentes {
            background-color: rgba(11, 26, 48, 0.95);
            border: 2px solid #e5c158; /* Borda dourada */
            border-radius: 15px;
            width: 100%;
            max-width: 450px;
            padding: 35px 25px;
            box-shadow: 0px 4px 25px rgba(0, 0, 0, 0.6);
            text-align: center;
            color: #ffffff;
        }

        /* Ícone de cabeçalho */
        .topo-icone {
            font-size: 42px;
            color: #e5c158;
            margin-bottom: 15px;
        }

        h1 {
            color: #e5c158;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        p.subtitulo {
            font-size: 14px;
            color: #a4b3c6;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Seção das Informações de Tamanho */
        .opcao-bloco {
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(229, 193, 88, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
        }

        .opcao-bloco h2 {
            color: #e5c158;
            font-size: 15px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Grid para organizar as informações */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #e5c158;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .info-item strong {
            color: #a4b3c6;
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .info-item span {
            color: #ffffff;
            font-weight: bold;
        }

        /* Botão Voltar */
        .btn-voltar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #a4b3c6;
            text-decoration: none;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }

        .btn-voltar:hover {
            color: #e5c158;
        }
    </style>
</head>
<body>

    <div class="card-presentes">
        
        <div class="topo-icone">
            <i class="fa-solid fa-gift"></i>
        </div>
        
        <h1>Sugestões de Presentes</h1>
        <p class="subtitulo">
        <!-- Bloco de Tamanhos e Medidas -->
        <div class="opcao-bloco">
            <h2><i class="fa-solid fa-shirt"></i> Tamanhos e Preferências</h2>
            
            <div class="info-grid">
                <div class="info-item">
                    <strong>Camisa</strong>
                    <span>G / 42</span>
                </div>
                <div class="info-item">
                    <strong>Calça / Bermuda</strong>
                    <span>42</span>
                </div>
                <div class="info-item">
                    <strong>Calçado</strong>
                    <span>42/43</span>
                </div>
                <div class="info-item">
                    <strong>Estilo</strong>
                    <span>Esporte Fino, casual, social etc</span>
                </div>
            </div>
        </div>

        <!-- Link para retornar ao convite -->
        <!-- Lembre-se de ajustar 'index.html' se o arquivo do seu convite principal tiver outro nome -->
        <a href="index.html" class="btn-voltar">
            <i class="fa-solid fa-chevron-left"></i> Voltar ao Convite
        </a>

    </div>

</body>
</html>
